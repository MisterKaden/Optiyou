name: Deploy Worker

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

env:
  HAS_CLOUDFLAREOPTI_API_TOKEN: ${{ secrets.CLOUDFLAREOPTI_API_TOKEN != '' }}
  HAS_CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID != '' }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    name: Deploy to Cloudflare
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Validate Worker bundle
        run: npm run check

      - name: Apply D1 migrations
        if: env.HAS_CLOUDFLAREOPTI_API_TOKEN == 'true' && env.HAS_CLOUDFLARE_ACCOUNT_ID == 'true'
        run: npx wrangler d1 migrations apply optiyou-core --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLAREOPTI_API_TOKEN }}

      - name: Cloudflare deploy skipped
        if: env.HAS_CLOUDFLAREOPTI_API_TOKEN != 'true' || env.HAS_CLOUDFLARE_ACCOUNT_ID != 'true'
        run: |
          echo "::notice::Skipping Cloudflare deploy because CLOUDFLAREOPTI_API_TOKEN or CLOUDFLARE_ACCOUNT_ID is missing."

      - name: Deploy
        if: env.HAS_CLOUDFLAREOPTI_API_TOKEN == 'true' && env.HAS_CLOUDFLARE_ACCOUNT_ID == 'true'
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLAREOPTI_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Apply DNS and zone baseline
        if: env.HAS_CLOUDFLAREOPTI_API_TOKEN == 'true' && env.HAS_CLOUDFLARE_ACCOUNT_ID == 'true'
        run: npm run cloudflare:bootstrap
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLAREOPTI_API_TOKEN }}
