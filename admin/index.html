<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Optiyou Admin</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #18201f;
        --muted: #61706c;
        --paper: #f8faf7;
        --line: #d9e2df;
        --accent: #0f766e;
        --danger: #c33b41;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--paper);
        color: var(--ink);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(1180px, calc(100% - 32px));
        margin: 0 auto;
        padding: 32px 0;
      }

      header {
        display: flex;
        justify-content: space-between;
        gap: 24px;
        align-items: end;
        border-bottom: 1px solid var(--line);
        padding-bottom: 18px;
      }

      h1 {
        margin: 0;
        font-size: 2.4rem;
        letter-spacing: 0;
      }

      p {
        color: var(--muted);
      }

      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
        margin-top: 24px;
      }

      section {
        min-height: 320px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: white;
        padding: 18px;
      }

      input,
      button {
        min-height: 42px;
        border-radius: 8px;
        font: inherit;
      }

      input {
        width: 100%;
        border: 1px solid var(--line);
        padding: 0 12px;
      }

      button {
        border: 0;
        background: var(--accent);
        color: white;
        font-weight: 800;
        padding: 0 14px;
      }

      button.secondary {
        background: #e7efed;
        color: var(--ink);
      }

      button.danger {
        background: var(--danger);
      }

      .row {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
      }

      .item {
        border-top: 1px solid var(--line);
        padding: 12px 0;
      }

      .meta,
      .uploads {
        display: grid;
        gap: 6px;
        margin: 8px 0 0;
      }

      .meta {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .uploads {
        font-size: 0.88rem;
      }

      .upload {
        overflow-wrap: anywhere;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 12px;
      }

      .status {
        color: var(--danger);
        font-weight: 800;
      }

      @media (max-width: 820px) {
        header,
        .grid {
          grid-template-columns: 1fr;
          display: grid;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>Optiyou Admin</h1>
          <p>Review AI extractions, search products, resolve corrections, and audit product truth.</p>
        </div>
        <p class="status">Deploy behind Cloudflare Access.</p>
      </header>

      <div class="grid">
        <section>
          <h2>Product Search</h2>
          <div class="row">
            <input id="query" placeholder="GTIN, product, or brand" />
            <button id="search">Search</button>
          </div>
          <div id="products"></div>
        </section>

        <section>
          <h2>Review Queue</h2>
          <button id="refresh">Refresh</button>
          <div id="queue"></div>
        </section>
      </div>
    </main>

    <script>
      const storedToken = sessionStorage.getItem("optiyouAdminToken") || "";
      const token = storedToken || prompt("Admin API token") || "";
      if (token && token !== storedToken) {
        sessionStorage.setItem("optiyouAdminToken", token);
      }

      async function api(path, options = {}) {
        const response = await fetch(path, {
          method: options.method || "GET",
          headers: {
            "x-optiyou-admin-token": token,
            ...(options.body ? { "content-type": "application/json" } : {})
          },
          body: options.body ? JSON.stringify(options.body) : undefined
        });
        return response.json();
      }

      function text(tagName, content, className) {
        const element = document.createElement(tagName);
        element.textContent = content;
        if (className) {
          element.className = className;
        }
        return element;
      }

      function renderProducts(target, rows, empty) {
        target.replaceChildren();
        if (!rows.length) {
          const emptyState = document.createElement("p");
          emptyState.textContent = empty;
          target.append(emptyState);
          return;
        }

        for (const row of rows) {
          const item = document.createElement("div");
          const title = document.createElement("strong");
          const detail = document.createElement("p");

          item.className = "item";
          title.textContent = row.name || row.id || "Unknown product";
          detail.textContent = row.gtin || row.status || "";
          item.append(title, detail);
          target.append(item);
        }
      }

      function renderQueue(rows) {
        const target = document.getElementById("queue");
        target.replaceChildren();
        if (!rows.length) {
          target.append(text("p", "Nothing pending review."));
          return;
        }

        for (const row of rows) {
          const item = document.createElement("div");
          const title = text("strong", row.gtin || row.id || "Unknown contribution");
          const meta = document.createElement("div");
          const uploads = document.createElement("div");
          const actions = document.createElement("div");

          item.className = "item";
          meta.className = "meta";
          uploads.className = "uploads";
          actions.className = "actions";

          meta.append(
            text("span", `Status: ${row.status || "unknown"}`),
            text("span", `Uploads: ${row.uploadsReceived || 0}/${row.totalUploads || 0}`)
          );

          for (const upload of row.uploads || []) {
            uploads.append(text("div", `${upload.kind}: ${upload.status} · ${upload.r2Key}`, "upload"));
          }

          actions.append(
            decisionButton(row.id, "approved", "Approve"),
            decisionButton(row.id, "rejected", "Reject", "danger"),
            decisionButton(row.id, "needs_review", "Needs review", "secondary")
          );

          item.append(title, meta, uploads, actions);
          target.append(item);
        }
      }

      function decisionButton(id, status, label, className) {
        const button = document.createElement("button");
        button.type = "button";
        button.textContent = label;
        if (className) {
          button.className = className;
        }
        button.addEventListener("click", async () => {
          await api(`/v1/admin/contributions/${encodeURIComponent(id)}`, {
            method: "PATCH",
            body: { status }
          });
          await loadQueue();
        });
        return button;
      }

      async function loadQueue() {
        const data = await api("/v1/admin/review-queue");
        renderQueue(data.queue || []);
      }

      document.getElementById("search").addEventListener("click", async () => {
        const query = encodeURIComponent(document.getElementById("query").value);
        const data = await api(`/v1/admin/products?query=${query}`);
        renderProducts(document.getElementById("products"), data.products || [], "No products found.");
      });

      document.getElementById("refresh").addEventListener("click", async () => {
        await loadQueue();
      });

      loadQueue();
    </script>
  </body>
</html>
