name: Optiyou
options:
  bundleIdPrefix: co.optiyou
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0
    SWIFT_VERSION: 6.0
targets:
  Optiyou:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Optiyou
    info:
      path: Optiyou/Info.plist
      properties:
        CFBundleDisplayName: Optiyou
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSCameraUsageDescription: "Optiyou uses the camera to scan food labels and barcodes."
        NSPhotoLibraryUsageDescription: "Optiyou can use selected label photos for missing product contributions."
        OPTIYOU_API_BASE_URL: "$(OPTIYOU_API_BASE_URL)"
        OPTIYOU_API_ACCESS_TOKEN: "$(OPTIYOU_API_ACCESS_TOKEN)"
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: co.optiyou.app
  OptiyouTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: OptiyouTests
    dependencies:
      - target: Optiyou
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: co.optiyou.app.tests
        GENERATE_INFOPLIST_FILE: YES
